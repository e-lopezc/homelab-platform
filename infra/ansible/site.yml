---
# k3s bootstrap: install the control-plane, join the workers, then merge a `homelab`
# context into the local ~/.kube/config. Run from infra/ansible/ (see README.md).

- name: Install k3s control-plane (server)
  hosts: server
  roles:
    - k3s_server

- name: Install and join k3s workers (agents)
  hosts: agents
  roles:
    - k3s_agent

- name: Fetch kubeconfig and merge into ~/.kube/config
  hosts: server
  gather_facts: false
  tasks:
    - name: Read k3s.yaml from the server
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig

    - name: Write a localized kubeconfig (server IP + 'homelab' names)
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/homelab.kubeconfig"
        mode: "0600"
        content: >-
          {{ k3s_kubeconfig.content | b64decode
             | regex_replace('https://127.0.0.1:6443', 'https://' ~ ansible_host ~ ':6443')
             | regex_replace('name: default', 'name: homelab')
             | regex_replace('cluster: default', 'cluster: homelab')
             | regex_replace('user: default', 'user: homelab')
             | regex_replace('current-context: default', 'current-context: homelab') }}
      delegate_to: localhost
      become: false

    - name: Merge the homelab context into ~/.kube/config (backs up existing first)
      # Use the explicit `cmd:` parameter (not bare free-form) so ansible-core's
      # argument splitter doesn't try to parse the shell body — and keep the body
      # Jinja-free by passing the kubeconfig path in via `environment:`.
      ansible.builtin.shell:
        cmd: |
          set -e
          mkdir -p ~/.kube
          if [ -f ~/.kube/config ]; then
            cp ~/.kube/config ~/.kube/config.bak.$(date +%Y%m%d%H%M%S)
            # Drop stale homelab entries so a rebuilt cluster's fresh certs win
            # (kubectl merge is "first-wins", so old entries would otherwise persist).
            kubectl config delete-context homelab >/dev/null 2>&1 || true
            kubectl config delete-cluster homelab >/dev/null 2>&1 || true
            kubectl config delete-user    homelab >/dev/null 2>&1 || true
          fi
          KUBECONFIG="$HOME/.kube/config:$HOMELAB_KUBECONFIG" \
            kubectl config view --flatten > ~/.kube/config.new
          mv ~/.kube/config.new ~/.kube/config
          chmod 600 ~/.kube/config
      environment:
        HOMELAB_KUBECONFIG: "{{ playbook_dir }}/homelab.kubeconfig"
      delegate_to: localhost
      become: false
      run_once: true
